apiVersion: apps/v1
kind: Deployment
metadata:
  name: users
  namespace: opfab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      initContainers:
      - name: wait-for-mongodb
        image: busybox
        command: ['sh', '-c', 'until nc -z mongodb 27017; do echo waiting for mongodb; sleep 2; done']
      containers:
      - name: users
        image: lfeoperatorfabric/of-users-service:4.11.1.RELEASE
        ports:
        - containerPort: 2103
        volumeMounts:
        - name: config
          mountPath: /config
        env:
        - name: SPRING_CONFIG_ADDITIONAL_LOCATION
          value: /config/
      volumes:
      - name: config
        configMap:
          name: opfab-common-config
          items:
          - key: common.yml
            path: common.yml
---
apiVersion: v1
kind: Service
metadata:
  name: users
  namespace: opfab
spec:
  selector:
    app: users
  ports:
  - port: 2103
    targetPort: 2103
