apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: opfab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0.1
        args: ["start-dev"]
        ports:
        - containerPort: 8080
        env:
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: admin
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HOSTNAME_STRICT_HTTPS
          value: "false"
        readinessProbe:
          httpGet:
            path: /realms/master
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 10
          failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: opfab
spec:
  selector:
    app: keycloak
  ports:
  - port: 8080
    targetPort: 8080
