apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: opfab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-ui
  template:
    metadata:
      labels:
        app: web-ui
    spec:
      containers:
      - name: web-ui
        image: lfeoperatorfabric/of-web-ui:4.11.1.RELEASE
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /ui/
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: opfab
spec:
  selector:
    app: web-ui
  ports:
  - port: 2002
    targetPort: 80
